name: Auto Blog Post

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '5533847195'
        run: |
          TOPICS=(
            "외국인 투자법인 설립 절차 완벽 가이드"
            "D-8 기업투자비자 신청 방법과 필요서류"
            "한국 외국인 투자 지역 세금 혜택 총정리"
            "외국인 사업자등록 신청 절차와 주의사항"
            "E-7 전문직 취업비자 vs D-8 투자비자 비교"
            "외국인 투자기업 4대보험 가입 가이드"
            "F-2 거주비자에서 F-5 영주권 전환 절차"
            "한국 법인 설립 시 자본금 송금과 외국환 신고"
            "외국인 부동산 취득 절차와 세금 안내"
            "한국 창업비자 D-10 신청 조건과 절차"
          )

          DAY=$(date +%-j)
          INDEX=$((DAY % ${#TOPICS[@]}))
          TOPIC="${TOPICS[$INDEX]}"
          DATE=$(date +%Y-%m-%d)
          SLUG="post-$(date +%s | tail -c 9)"

          echo "Topic: $TOPIC"
          echo "Slug: $SLUG"

          RESPONSE=$(curl -s "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GH_MODELS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg topic "$TOPIC" \
              '{
                model: "gpt-4o-mini",
                max_tokens: 16000,
                temperature: 0.7,
                messages: [
                  {role: "system", content: "You are a professional blog writer for VISION Administrative Office specializing in Korean immigration, visa, and company establishment services. Write a blog article in clean MARKDOWN format (NOT HTML). Rules: Use ## for h2, ### for h3. Use markdown tables. Add 5+ FAQ. Add internal links. 15000+ characters. Write in Korean."},
                  {role: "user", content: $topic}
                ]
              }')")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$CONTENT" ]; then
            echo "Failed to generate content"
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=❌ InvestKorea 블로그 생성 실패: ${TOPIC}"
            exit 1
          fi

          mkdir -p content/blog
          cat > "content/blog/${SLUG}.md" << BLOGEOF
---
title: "${TOPIC}"
date: "${DATE}"
category: "visa"
excerpt: "${TOPIC}"
image: "/slides/documents.jpg"
slug: "${SLUG}"
---

${CONTENT}
BLOGEOF

          git config user.name "Blog Bot"
          git config user.email "bot@investkorea.co.kr"
          git add "content/blog/${SLUG}.md"
          git commit -m "blog: ${TOPIC}"
          git push

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=✅ InvestKorea 블로그 발행!
제목: ${TOPIC}
파일: ${SLUG}.md"
